<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional Whiteboard - Advanced Pages</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/libs/pptxgen.bundle.js"></script>
    <script src="js/libs/jspdf.umd.min.js"></script>
</head>

<body class="dark-mode">
    <div class="file-sync-container" id="file-sync-container">
        <span class="toggle-label">Sync to File:</span>
        <label class="switch">
            <input type="checkbox" id="sync-toggle">
            <span class="slider"></span>
        </label>
        <span id="sync-filename">No file</span>
    </div>

    <div id="toolbar">
        <div class="tool-group" style="position: relative;">
            <button id="theme-btn" class="btn" title="Switch Theme">⚪</button>
            <button id="grid-btn" class="btn" title="Grid Settings (G)">🌐</button>
            <div id="grid-settings" class="grid-settings">
                <div class="grid-setting-item">
                    <label>Grid X (Horizontal):</label>
                    <input type="number" id="grid-x-input" value="30">
                </div>
                <div class="grid-setting-item">
                    <label>Grid Y (Vertical):</label>
                    <input type="number" id="grid-y-input" value="30">
                </div>
            </div>
        </div>
        <div class="tool-group">
            <button id="add-page" class="btn" title="Insert Page After Current (Shift+N)">➕</button>
            <button id="del-page" class="btn danger" title="Delete Current Page">🗑️</button>
        </div>
        <div class="tool-group">
            <button id="pen-tool" class="btn active" title="Pen (D)">✏️</button>
            <button id="eraser-tool" class="btn" title="Eraser (E)">🧼</button>
            <button id="select-tool" class="btn" title="Select Item">✂️</button>
        </div>
        <div class="tool-group" style="position: relative;">
            <button id="color-btn" class="btn" title="Choose Color">
                <div class="color-preview" style="background-color: #ffffff;"></div>
            </button>
            <div id="color-dropdown" class="color-dropdown">
                <div id="color-palette" class="color-palette">
                    <div class="color-swatch active" style="background-color: #ffffff;" data-color="#ffffff" title="Adaptive White/Black"></div>
                    <div class="color-swatch" style="background-color: #ff4d4d;" data-color="#ff4d4d" title="Red"></div>
                    <div class="color-swatch" style="background-color: #2ecc71;" data-color="#2ecc71" title="Green"></div>
                    <div class="color-swatch" style="background-color: #3498db;" data-color="#3498db" title="Blue"></div>
                    <div class="color-swatch" style="background-color: #f1c40f;" data-color="#f1c40f" title="Yellow"></div>
                    <div class="color-swatch" style="background-color: #e67e22;" data-color="#e67e22" title="Orange"></div>
                    <div class="color-swatch" style="background-color: #9b59b6;" data-color="#9b59b6" title="Purple"></div>
                </div>
            </div>
            <input type="range" id="size-slider" min="1" max="100" value="3">
            <input type="number" id="size-input" value="3">
        </div>
        <div class="tool-group">
            <button id="upload-btn" class="btn" title="Upload Image">🖼️</button>
            <button id="undo-btn" class="btn" title="Undo (Ctrl+Z)">↩️</button>
            <button id="redo-btn" class="btn" title="Redo (Ctrl+Y)">↪️</button>
            <button id="clear-btn" class="btn danger" title="Clear Page">🧹</button>
        </div>
    </div>

    <div class="top-right-actions">
        <button id="open-btn" class="action-btn" title="Open Whiteboard File (.wb)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
        </button>
        <div class="action-group">
            <button id="export-toggle-btn" class="action-btn" title="Export Options">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
            </button>
            <div id="export-dropdown" class="dropdown-menu">
                <div class="dropdown-item" id="export-pptx">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path>
                        <path d="M12 12v9"></path>
                        <path d="m8 17 4 4 4-4"></path>
                    </svg>
                    Save as PPTX
                </div>
                <div class="dropdown-item" id="export-pdf">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    Save as PDF
                </div>
                <div class="dropdown-item" id="export-wb">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                    Save as .WB
                </div>
            </div>
        </div>
    </div>

    <div id="left-nav" class="side-nav">
        <div id="prev-page" class="nav-circle" title="Previous Page (P)">◀</div>
        <div class="page-label">PG <span class="cur-pg-display">1</span></div>
    </div>

    <div id="right-nav" class="side-nav">
        <div id="next-page" class="nav-circle" title="Next Page (N)">▶</div>
        <div class="page-label">PG <span class="cur-pg-display">1</span></div>
    </div>

    <div id="canvas-container" class="tool-pen">
        <canvas id="main-canvas"></canvas>
        <div id="selection-marquee"></div>
    </div>

    <input type="file" id="file-input" style="display:none" accept="image/*">
    <input type="file" id="wb-file-input" style="display:none" accept=".wb,application/json">
    <div id="toast"></div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
