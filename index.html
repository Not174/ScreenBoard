<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional Whiteboard - Advanced Pages</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body class="dark-mode">

    <div id="toolbar">
        <div class="tool-group" style="position: relative;">
            <button id="theme-btn" class="btn" title="Switch Theme">⚪</button>
            <button id="grid-btn" class="btn" title="Grid Settings (G)">🌐</button>
            <div id="grid-settings" class="grid-settings">
                <div class="grid-setting-item">
                    <label>Grid X (Horizontal):</label>
                    <input type="number" id="grid-x-input" value="30">
                </div>
                <div class="grid-setting-item">
                    <label>Grid Y (Vertical):</label>
                    <input type="number" id="grid-y-input" value="30">
                </div>
            </div>
        </div>
        <div class="tool-group">
            <button id="add-page" class="btn" title="Insert Page After Current (Shift+N)">➕</button>
            <button id="del-page" class="btn danger" title="Delete Current Page">🗑️</button>
        </div>
        <div class="tool-group">
            <button id="pen-tool" class="btn active" title="Pen (D)">✏️</button>
            <button id="eraser-tool" class="btn" title="Eraser (E)">🧼</button>
            <button id="select-tool" class="btn" title="Select Item">✂️</button>
        </div>
        <div class="tool-group">
            <input type="color" id="color-picker" value="#ffffff">
            <input type="range" id="size-slider" min="1" max="100" value="3">
            <input type="number" id="size-input" value="3">
        </div>
        <div class="tool-group">
            <button id="upload-btn" class="btn" title="Upload Image">🖼️</button>
            <button id="undo-btn" class="btn" title="Undo (Ctrl+Z)">↩️</button>
            <button id="redo-btn" class="btn" title="Redo (Ctrl+Y)">↪️</button>
            <button id="clear-btn" class="btn danger" title="Clear Page">🧹</button>
        </div>
    </div>

    <div class="top-right-actions">
        <button id="open-btn" class="action-btn" title="Open Whiteboard File (.wb)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
        </button>
        <div class="action-group">
            <button id="export-toggle-btn" class="action-btn" title="Export Options">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
            </button>
            <div id="export-dropdown" class="dropdown-menu">
                <div class="dropdown-item" id="export-pptx">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path><path d="M12 12v9"></path><path d="m8 17 4 4 4-4"></path></svg>
                    Save as PPTX
                </div>
                <div class="dropdown-item" id="export-pdf">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Save as PDF
                </div>
                <div class="dropdown-item" id="export-wb">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                    Save as .WB
                </div>
            </div>
        </div>
    </div>

    <div id="left-nav" class="side-nav">
        <div id="prev-page" class="nav-circle" title="Previous Page (P)">◀</div>
        <div class="page-label">PG <span class="cur-pg-display">1</span></div>
    </div>

    <div id="right-nav" class="side-nav">
        <div id="next-page" class="nav-circle" title="Next Page (N)">▶</div>
        <div class="page-label">PG <span class="cur-pg-display">1</span></div>
    </div>

    <div id="canvas-container" class="tool-pen">
        <canvas id="main-canvas"></canvas>
        <div id="selection-marquee"></div>
    </div>

    <input type="file" id="file-input" style="display:none" accept="image/*">
    <input type="file" id="wb-file-input" style="display:none" accept=".wb,application/json">
    <div id="toast"></div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const container = document.getElementById('canvas-container');
        const toast = document.getElementById('toast');
        const colorPicker = document.getElementById('color-picker');
        const sizeSlider = document.getElementById('size-slider');
        const sizeInput = document.getElementById('size-input');

        let drawing = false, selecting = false;
        let currentTool = 'pen';
        let history = [], redoStack = [], lastX = 0, lastY = 0;
        let selStartX = 0, selStartY = 0;
        let isDarkMode = true;
        let isGridVisible = false;
        let localClipboard = null;

        let currentPenSize = 3;
        let currentEraserSize = 30;
        let currentSize = 3;
        let eraserVisualSize = 30;

        let pages = [{ canvasData: null, items: [] }];
        let currentPageIndex = 0;

        function init() {
            resizeCanvas();
            window.addEventListener('resize', debounce(resizeCanvas, 250));

            document.getElementById('pen-tool').onclick = () => { flattenSelection(); setTool('pen'); };
            document.getElementById('eraser-tool').onclick = () => { flattenSelection(); setTool('eraser'); };
            document.getElementById('select-tool').onclick = () => setTool('select');

            document.getElementById('prev-page').onclick = prevPage;
            document.getElementById('next-page').onclick = nextPage;
            document.getElementById('add-page').onclick = addPage;
            document.getElementById('del-page').onclick = deletePage;

            document.getElementById('theme-btn').onclick = toggleTheme;
            document.getElementById('grid-btn').onclick = (e) => {
                e.stopPropagation();
                toggleGrid();
                toggleGridSettings(isGridVisible);
            };
            document.getElementById('grid-settings').onclick = (e) => e.stopPropagation();
            window.addEventListener('click', () => {
                const settings = document.getElementById('grid-settings');
                if (settings.classList.contains('active')) {
                    settings.classList.remove('active');
                }
            });
            document.getElementById('grid-x-input').oninput = updateGridSpacing;
            document.getElementById('grid-y-input').oninput = updateGridSpacing;
            document.getElementById('clear-btn').onclick = clearPage;
            document.getElementById('undo-btn').onclick = undo;
            document.getElementById('redo-btn').onclick = redo;
            document.getElementById('upload-btn').onclick = () => document.getElementById('file-input').click();
            document.getElementById('file-input').onchange = handleUpload;
            
            document.getElementById('export-toggle-btn').onclick = (e) => {
                e.stopPropagation();
                document.getElementById('export-dropdown').classList.toggle('active');
            };
            window.addEventListener('click', () => {
                document.getElementById('export-dropdown').classList.remove('active');
            });

            document.getElementById('export-pptx').onclick = exportToPPTX;
            document.getElementById('export-pdf').onclick = saveAsPDF;
            document.getElementById('export-wb').onclick = exportToFile;

            document.getElementById('open-btn').onclick = () => document.getElementById('wb-file-input').click();
            document.getElementById('wb-file-input').onchange = importFromFile;

            canvas.addEventListener('mousedown', startAction);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('mouseup', stopAction);

            window.addEventListener('mousedown', (e) => {
                if (!e.target.closest('.image-container') && !e.target.closest('#toolbar')) deselectAllImages();
            });

            window.addEventListener('keydown', (e) => {
                const isCtrl = e.ctrlKey || e.metaKey;
                const selected = document.querySelector('.image-container.selected');
                if ((e.key === 'Delete' || e.key === 'Backspace') && selected) {
                    selected.remove(); saveState(); showToast('Deleted');
                }
                if (isCtrl && e.key === 'c' && selected) {
                    localClipboard = { src: selected.querySelector('img').src, width: parseInt(selected.style.width) };
                    showToast('Copied');
                }
                if (isCtrl && e.key === 'v' && localClipboard) {
                    createImage(localClipboard.src, lastX + 10 + 'px', lastY + 10 + 'px', localClipboard.width + 'px');
                    saveState(); showToast('Pasted');
                }
                if (e.key === 'Escape') flattenSelection();
                else if (isCtrl && e.key === 'z') { e.preventDefault(); undo(); }
                else if (isCtrl && e.key === 'y') { e.preventDefault(); redo(); }
                else if (e.shiftKey && (e.key === 'n' || e.key === 'N')) { e.preventDefault(); addPage(); }
                else if (e.key === 'p' || e.key === 'P' || e.key === 'ArrowLeft') { e.preventDefault(); prevPage(); }
                else if ((e.key === 'n' || e.key === 'N' || e.key === 'ArrowRight') && !e.shiftKey) { e.preventDefault(); nextPage(); }

                // Tool shortcuts (only if no modifiers)
                if (!isCtrl && !e.altKey && !e.shiftKey) {
                    if (e.key === 'd' || e.key === 'D') { flattenSelection(); setTool('pen'); showToast('Pen'); }
                    else if (e.key === 'e' || e.key === 'E') { flattenSelection(); setTool('eraser'); showToast('Eraser'); }
                    else if (e.key === 'g' || e.key === 'G') { toggleGrid(); }
                }
            });

            sizeSlider.oninput = (e) => updateSize(e.target.value);
            sizeInput.oninput = (e) => updateSize(e.target.value);

            colorPicker.addEventListener('input', (e) => {
                updateCursorColor(e.target.value);
            });

            updateSize(currentPenSize);
            updateCursorColor(colorPicker.value);

            updatePageUI();
            saveState();

            window.addEventListener('paste', handleSystemPaste);
        }

        function updatePageUI() {
            const displays = document.querySelectorAll('.cur-pg-display');
            displays.forEach(d => d.innerText = currentPageIndex + 1);
            const prevBtn = document.getElementById('prev-page');
            const nextBtn = document.getElementById('next-page');
            prevBtn.classList.toggle('disabled', currentPageIndex === 0);
            nextBtn.classList.toggle('disabled', currentPageIndex === pages.length - 1);
        }

        function updateCursorColor(hexColor) {
            const isDark = document.body.classList.contains('dark-mode');
            const strokeColor = isDark ? 'white' : 'black';

            // Using the professional pen icon path for both themes as requested
            const penPath = "M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z";
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="${strokeColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${penPath}" fill="${hexColor}"/></svg>`;

            const encodedSvg = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);

            // Hotspot at the tip of the pen
            document.documentElement.style.setProperty('--cursor-pen', `url('${encodedSvg}') 0 24, auto`, 'important');
        }

        function updateEraserCursor(size) {
            // Constrain cursor SVG size somewhat to prevent massive performance drops or browser limits, but allow it to grow
            const displaySize = Math.min(size, 100);
            const halfSize = Math.floor(displaySize / 2);

            const isDark = document.body.classList.contains('dark-mode');
            // Contrast against the background (#171616 or #eae3e3)
            const strokeColor = isDark ? 'white' : 'black';
            const innerColor = isDark ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.4)';
            const fill = isDark ? 'rgba(23, 22, 22, 0.5)' : 'rgba(234, 227, 227, 0.5)';

            // Build a simple circle SVG that matches the brush size exactly
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${displaySize}" height="${displaySize}" viewBox="0 0 ${displaySize} ${displaySize}"><circle cx="${halfSize}" cy="${halfSize}" r="${halfSize - 1}" fill="${fill}" stroke="${strokeColor}" stroke-width="1"/><circle cx="${halfSize}" cy="${halfSize}" r="${halfSize - 2}" fill="none" stroke="${innerColor}" stroke-width="1"/></svg>`;

            const encodedSvg = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
            document.documentElement.style.setProperty('--cursor-eraser', `url('${encodedSvg}') ${halfSize} ${halfSize}, auto`, 'important');
        }

        function saveCurrentPageToMemory() {
            pages[currentPageIndex] = {
                canvasData: canvas.toDataURL(),
                items: Array.from(document.querySelectorAll('.image-container')).map(el => ({
                    src: el.querySelector('img').src,
                    top: el.style.top,
                    left: el.style.left,
                    width: el.style.width
                }))
            };
        }

        function loadPageFromMemory(index) {
            currentPageIndex = index;
            const state = pages[index];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.querySelectorAll('.image-container').forEach(e => e.remove());

            if (state && state.canvasData) {
                const img = new Image();
                img.onload = () => {
                    const dpr = window.devicePixelRatio || 1;
                    ctx.drawImage(img, 0, 0, canvas.width / dpr, canvas.height / dpr);
                };
                img.src = state.canvasData;
                if (state.items) state.items.forEach(i => createImage(i.src, i.left, i.top, i.width));
            }
            history = []; redoStack = [];
            updatePageUI();
            saveState();
        }

        function addPage() {
            saveCurrentPageToMemory();
            pages.splice(currentPageIndex + 1, 0, { canvasData: null, items: [] });
            loadPageFromMemory(currentPageIndex + 1);
            showToast(`Page inserted at ${currentPageIndex + 1}`);
        }

        function deletePage() {
            if (pages.length <= 1) {
                clearPage();
                return;
            }
            if (confirm(`Delete Page ${currentPageIndex + 1}?`)) {
                pages.splice(currentPageIndex, 1);
                const targetIdx = Math.max(0, currentPageIndex - 1);
                loadPageFromMemory(targetIdx);
                showToast("Page deleted");
            }
        }

        function nextPage() {
            if (currentPageIndex < pages.length - 1) {
                saveCurrentPageToMemory();
                loadPageFromMemory(currentPageIndex + 1);
            } else {
                showToast("No page exists after this");
            }
        }

        function prevPage() {
            if (currentPageIndex > 0) {
                saveCurrentPageToMemory();
                loadPageFromMemory(currentPageIndex - 1);
            } else {
                showToast("No page exists before this");
            }
        }

        function startAction(e) {
            const pos = getPos(e);
            lastX = pos.x; lastY = pos.y;
            if (currentTool === 'select') {
                selecting = true; selStartX = pos.x; selStartY = pos.y;
                const marquee = document.getElementById('selection-marquee');
                marquee.style.display = 'block';
                updateMarquee(pos.x, pos.y);
            } else {
                drawing = true;
                if (currentTool === 'eraser') eraserVisualSize = currentSize;
                if (redoStack.length > 0) redoStack = [];
                handleMove(e);
            }
        }

        function handleMove(e) {
            const pos = getPos(e);
            if (selecting) {
                updateMarquee(pos.x, pos.y);
            } else if (drawing) {
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(pos.x, pos.y);

                if (currentTool === 'eraser') {
                    ctx.globalCompositeOperation = 'destination-out';
                    const dist = Math.sqrt(Math.pow(pos.x - lastX, 2) + Math.pow(pos.y - lastY, 2));
                    const targetSize = dist > 5 ? Math.max(100, currentSize * 3) : currentSize;
                    eraserVisualSize = eraserVisualSize * 0.8 + targetSize * 0.2;
                    ctx.lineWidth = eraserVisualSize;
                    updateEraserCursor(eraserVisualSize);
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = colorPicker.value;
                    ctx.lineWidth = currentSize;
                }

                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
                lastX = pos.x; lastY = pos.y;
            }
        }

        function stopAction() {
            const marquee = document.getElementById('selection-marquee');
            if (currentTool === 'eraser') {
                updateEraserCursor(currentSize);
            }
            if (selecting) {
                const rect = marquee.getBoundingClientRect();
                const crect = container.getBoundingClientRect();
                const w = rect.width, h = rect.height;
                if (w > 5 && h > 5) captureSelection(rect.left - crect.left, rect.top - crect.top, w, h);
                marquee.style.display = 'none'; selecting = false;
            }
            if (drawing) { drawing = false; saveState(); }
        }

        function captureSelection(x, y, w, h) {
            const dpr = window.devicePixelRatio || 1;
            const temp = document.createElement('canvas');
            temp.width = w * dpr; temp.height = h * dpr;
            temp.getContext('2d').drawImage(canvas, x * dpr, y * dpr, w * dpr, h * dpr, 0, 0, w * dpr, h * dpr);
            ctx.clearRect(x, y, w, h);
            createImage(temp.toDataURL(), x + 'px', y + 'px', w + 'px');
            saveState();
        }

        function updateMarquee(x, y) {
            const marquee = document.getElementById('selection-marquee');
            marquee.style.left = Math.min(selStartX, x) + 'px';
            marquee.style.top = Math.min(selStartY, y) + 'px';
            marquee.style.width = Math.abs(selStartX - x) + 'px';
            marquee.style.height = Math.abs(selStartY - y) + 'px';
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function updateSize(val) {
            val = parseInt(val) || 1;
            currentSize = val;
            sizeSlider.value = val;
            sizeInput.value = val;
            if (currentTool === 'pen') {
                currentPenSize = val;
            } else if (currentTool === 'eraser') {
                currentEraserSize = val;
                updateEraserCursor(val);
            }
        }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('#toolbar .btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`${tool}-tool`).classList.add('active');

            // Fix: Use classList to avoid overwriting show-grid class
            container.classList.remove('tool-pen', 'tool-eraser', 'tool-select');
            container.classList.add(`tool-${tool}`);

            if (tool === 'pen') {
                updateSize(currentPenSize);
            } else if (tool === 'eraser') {
                updateSize(currentEraserSize);
                updateEraserCursor(currentEraserSize);
            }
        }

        function saveState() {
            const snap = {
                canvas: canvas.toDataURL(),
                items: Array.from(document.querySelectorAll('.image-container')).map(el => ({
                    src: el.querySelector('img').src,
                    top: el.style.top, left: el.style.left, width: el.style.width
                }))
            };
            history.push(JSON.stringify(snap));
            if (history.length > 30) history.shift();
            redoStack = [];
        }

        function undo() {
            if (history.length > 1) {
                redoStack.push(history.pop());
                applyState(history[history.length - 1]);
            }
        }

        function redo() {
            if (redoStack.length > 0) {
                const s = redoStack.pop();
                history.push(s);
                applyState(s);
            }
        }

        function applyState(s) {
            const state = JSON.parse(s);
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const dpr = window.devicePixelRatio || 1;
                ctx.drawImage(img, 0, 0, canvas.width / dpr, canvas.height / dpr);
            };
            img.src = state.canvas;
            document.querySelectorAll('.image-container').forEach(e => e.remove());
            state.items.forEach(i => createImage(i.src, i.left, i.top, i.width));
        }

        function clearPage() {
            if (confirm("Clear drawings on this page?")) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                document.querySelectorAll('.image-container').forEach(e => e.remove());
                saveState();
            }
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light-mode');
            document.getElementById('theme-btn').textContent = isDarkMode ? '⚪' : '⚫';

            // Adjust pen color for visibility
            if (!isDarkMode && colorPicker.value.toLowerCase() === '#ffffff') {
                colorPicker.value = '#000000';
            } else if (isDarkMode && colorPicker.value.toLowerCase() === '#000000') {
                colorPicker.value = '#ffffff';
            }

            const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < data.data.length; i += 4) {
                if (data.data[i + 3] > 0) {
                    const r = data.data[i], g = data.data[i + 1], b = data.data[i + 2];
                    // If the color is white/near-white or black/near-black, invert it
                    // Pure white: 255,255,255. Pure black: 0,0,0.
                    // We use a small threshold to catch anti-aliased edges
                    const isWhite = r > 240 && g > 240 && b > 240;
                    const isBlack = r < 15 && g < 15 && b < 15;

                    if (isWhite || isBlack) {
                        data.data[i] = 255 - r;
                        data.data[i + 1] = 255 - g;
                        data.data[i + 2] = 255 - b;
                    }
                }
            }
            ctx.putImageData(data, 0, 0);
            updateCursorColor(colorPicker.value);
            if (currentTool === 'eraser') updateEraserCursor(currentEraserSize);
            saveState();
        }

        function toggleGrid() {
            isGridVisible = !isGridVisible;
            container.classList.toggle('show-grid', isGridVisible);
            document.getElementById('grid-btn').classList.toggle('active', isGridVisible);
            showToast(isGridVisible ? 'Grid On' : 'Grid Off');
        }

        function toggleGridSettings(forceOpen) {
            const settings = document.getElementById('grid-settings');
            if (forceOpen !== undefined) {
                settings.classList.toggle('active', forceOpen);
            } else {
                settings.classList.toggle('active');
            }
        }

        function updateGridSpacing() {
            const gx = document.getElementById('grid-x-input').value || 30;
            const gy = document.getElementById('grid-y-input').value || 30;
            document.documentElement.style.setProperty('--grid-x', gx + 'px');
            document.documentElement.style.setProperty('--grid-y', gy + 'px');
        }

        function handleSystemPaste(e) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (const item of items) {
                if (item.type.indexOf("image") !== -1) {
                    const blob = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        createImage(event.target.result, (lastX + 20) + 'px', (lastY + 20) + 'px', '300px');
                    };
                    reader.readAsDataURL(blob);
                } else if (item.kind === 'string' && item.type === 'text/plain') {
                    item.getAsString((text) => {
                        const textDataUrl = textToDataURL(text);
                        createImage(textDataUrl, (lastX + 20) + 'px', (lastY + 20) + 'px', 'auto');
                    });
                }
            }
        }

        function textToDataURL(text) {
            const tempCanvas = document.createElement('canvas');
            const tctx = tempCanvas.getContext('2d');
            const font = '16px sans-serif';
            tctx.font = font;

            const lines = text.split('\n');
            let maxWidth = 0;
            lines.forEach(line => {
                const w = tctx.measureText(line).width;
                if (w > maxWidth) maxWidth = w;
            });

            const hPadding = 20;
            const vPadding = 12; // Reduced vertical padding
            const lineHeight = 22;
            tempCanvas.width = maxWidth + hPadding * 2;
            tempCanvas.height = (lines.length * lineHeight) + vPadding * 2;

            // Background
            tctx.fillStyle = isDarkMode ? '#1e293b' : '#ffffff';
            tctx.roundRect ? tctx.roundRect(0, 0, tempCanvas.width, tempCanvas.height, 8) : tctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tctx.fill();
            tctx.strokeStyle = isDarkMode ? '#38bdf8' : '#2563eb';
            tctx.lineWidth = 2;
            tctx.stroke();

            // Text
            tctx.font = font;
            tctx.fillStyle = isDarkMode ? '#f1f5f9' : '#1e293b';
            tctx.textBaseline = 'top';
            lines.forEach((line, i) => {
                tctx.fillText(line, hPadding, vPadding + (i * lineHeight));
            });

            return tempCanvas.toDataURL();
        }

        function handleUpload(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => createImage(ev.target.result, '50px', '50px', '200px');
                reader.readAsDataURL(file);
            }
        }

        function flattenSelection() {
            document.querySelectorAll('.image-container').forEach(wrapper => {
                const img = wrapper.querySelector('img');
                const rect = wrapper.getBoundingClientRect();
                const crect = canvas.getBoundingClientRect();
                ctx.drawImage(img, rect.left - crect.left, rect.top - crect.top, rect.width, rect.height);
                wrapper.remove();
            });
            saveState();
        }

        function createImage(src, left, top, width) {
            const wrap = document.createElement('div');
            wrap.className = 'image-container';
            wrap.style.left = left; wrap.style.top = top; wrap.style.width = width;

            const img = document.createElement('img'); img.src = src;
            const menu = document.createElement('div'); menu.className = 'selection-menu';
            menu.innerHTML = `<button class="menu-btn">📋 Copy</button><button class="menu-btn danger">🗑️ Delete</button><button class="menu-btn">✅ Done</button>`;
            const resizer = document.createElement('div'); resizer.className = 'resizer';

            wrap.append(img, menu, resizer);
            container.appendChild(wrap);

            const btns = menu.querySelectorAll('button');
            btns[0].onclick = (e) => { e.stopPropagation(); createImage(src, (parseInt(wrap.style.left) + 20) + 'px', (parseInt(wrap.style.top) + 20) + 'px', wrap.style.width); saveState(); };
            btns[1].onclick = (e) => { e.stopPropagation(); wrap.remove(); saveState(); };
            btns[2].onclick = (e) => { e.stopPropagation(); flattenSelection(); };

            makeDraggable(wrap);
            makeResizable(wrap, resizer);
            selectImage(wrap);
        }

        function makeDraggable(el) {
            el.onmousedown = (e) => {
                if (e.target.closest('.selection-menu') || e.target.className === 'resizer') return;
                e.preventDefault();
                selectImage(el);
                let startX = e.clientX, startY = e.clientY;
                document.onmousemove = (me) => {
                    el.style.left = (el.offsetLeft + (me.clientX - startX)) + 'px';
                    el.style.top = (el.offsetTop + (me.clientY - startY)) + 'px';
                    startX = me.clientX; startY = me.clientY;
                };
                document.onmouseup = () => { document.onmousemove = null; saveState(); };
            };
        }

        function makeResizable(el, handle) {
            handle.onmousedown = (e) => {
                e.preventDefault(); e.stopPropagation();
                let startW = el.offsetWidth, startX = e.clientX;
                const onMove = (me) => el.style.width = Math.max(20, startW + (me.clientX - startX)) + 'px';
                const onUp = () => { window.removeEventListener('mousemove', onMove); saveState(); };
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onUp, { once: true });
            };
        }

        function selectImage(el) { deselectAllImages(); el.classList.add('selected'); }
        function deselectAllImages() { document.querySelectorAll('.image-container').forEach(i => i.classList.remove('selected')); }

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = container.getBoundingClientRect();
            if (rect.width === 0) return;
            const temp = canvas.toDataURL();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            ctx.scale(dpr, dpr);
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
            img.src = temp;
        }

        function showToast(msg) {
            toast.innerText = msg; toast.style.opacity = 1;
            setTimeout(() => toast.style.opacity = 0, 2000);
        }

        async function saveAsPDF() {
            showToast('Generating PDF...');
            saveCurrentPageToMemory();

            const { jsPDF } = window.jspdf;
            const dpr = window.devicePixelRatio || 1;
            const W = canvas.width / dpr;
            const H = canvas.height / dpr;

            // Create PDF in landscape orientation with matching aspect ratio
            const pdf = new jsPDF({
                orientation: 'landscape',
                unit: 'px',
                format: [W, H]
            });

            for (let i = 0; i < pages.length; i++) {
                const page = pages[i];
                if (i > 0) pdf.addPage([W, H], 'landscape');

                const offscreen = document.createElement('canvas');
                offscreen.width = canvas.width;
                offscreen.height = canvas.height;
                const octx = offscreen.getContext('2d');
                octx.scale(dpr, dpr);

                octx.fillStyle = isDarkMode ? '#171616' : '#eae3e3';
                octx.fillRect(0, 0, W, H);

                if (isGridVisible) {
                    const gx = parseInt(document.getElementById('grid-x-input').value) || 30;
                    const gy = parseInt(document.getElementById('grid-y-input').value) || 30;
                    octx.strokeStyle = isDarkMode ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.1)';
                    octx.lineWidth = 1;
                    octx.beginPath();
                    for (let x = 0; x <= W; x += gx) { octx.moveTo(x, 0); octx.lineTo(x, H); }
                    for (let y = 0; y <= H; y += gy) { octx.moveTo(0, y); octx.lineTo(W, y); }
                    octx.stroke();
                }

                if (page.canvasData) {
                    await new Promise(res => {
                        const img = new Image();
                        img.onload = () => { octx.drawImage(img, 0, 0, W, H); res(); };
                        img.src = page.canvasData;
                    });
                }

                if (page.items) {
                    for (const item of page.items) {
                        await new Promise(res => {
                            const img = new Image();
                            img.onload = () => {
                                const l = parseFloat(item.left);
                                const t = parseFloat(item.top);
                                const w = parseFloat(item.width);
                                const ratio = img.naturalHeight / img.naturalWidth;
                                octx.drawImage(img, l, t, w, w * ratio);
                                res();
                            };
                            img.onerror = res;
                            img.src = item.src;
                        });
                    }
                }

                const imgData = offscreen.toDataURL('image/png');
                pdf.addImage(imgData, 'PNG', 0, 0, W, H);
            }

            try {
                const blob = pdf.output('blob');
                const suggestedName = `Whiteboard_${new Date().getTime()}.pdf`;
                await saveBlobWithPicker(blob, suggestedName, [{
                    description: 'PDF Document',
                    accept: { 'application/pdf': ['.pdf'] }
                }]);
            } catch (err) {
                console.error(err);
                showToast('PDF Export Failed');
            }
        }

        async function exportToFile() {
            saveCurrentPageToMemory();
            const state = {
                version: "1.0",
                pages: pages,
                currentPageIndex: currentPageIndex,
                settings: {
                    isDarkMode: isDarkMode,
                    isGridVisible: isGridVisible,
                    gridX: document.getElementById('grid-x-input').value,
                    gridY: document.getElementById('grid-y-input').value
                }
            };
            const blob = new Blob([JSON.stringify(state)], { type: 'application/json' });
            const suggestedName = `whiteboard_${new Date().getTime()}.wb`;
            
            await saveBlobWithPicker(blob, suggestedName, [{
                description: 'Whiteboard File',
                accept: { 'application/json': ['.wb'] }
            }]);
        }

        function importFromFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const state = JSON.parse(ev.target.result);
                    if (state.pages) {
                        pages = state.pages;
                        currentPageIndex = state.currentPageIndex || 0;
                        if (state.settings) {
                            if (isDarkMode !== state.settings.isDarkMode) toggleTheme();
                            isGridVisible = state.settings.isGridVisible;
                            container.classList.toggle('show-grid', isGridVisible);
                            document.getElementById('grid-btn').classList.toggle('active', isGridVisible);
                            document.getElementById('grid-x-input').value = state.settings.gridX;
                            document.getElementById('grid-y-input').value = state.settings.gridY;
                            updateGridSpacing();
                        }
                        loadPageFromMemory(currentPageIndex);
                        showToast('Loaded successfully');
                    }
                } catch (err) {
                    showToast('Error loading file');
                    console.error(err);
                }
            };
            reader.readAsText(file);
        }

        async function exportToPPTX() {
            showToast('Generating PPTX...');
            saveCurrentPageToMemory();
            
            const pptx = new PptxGenJS();
            const dpr = window.devicePixelRatio || 1;
            const W = canvas.width / dpr;
            const H = canvas.height / dpr;

            // Set layout as landscape
            pptx.layout = 'LAYOUT_WIDE'; // 13.3 x 7.5 inches

            for (let i = 0; i < pages.length; i++) {
                const page = pages[i];
                const slide = pptx.addSlide();
                
                // Create flattened image for the slide background/content
                const offscreen = document.createElement('canvas');
                offscreen.width = canvas.width;
                offscreen.height = canvas.height;
                const octx = offscreen.getContext('2d');
                octx.scale(dpr, dpr);
                octx.fillStyle = isDarkMode ? '#171616' : '#eae3e3';
                octx.fillRect(0, 0, W, H);

                if (page.canvasData) {
                    await new Promise(res => {
                        const img = new Image();
                        img.onload = () => { octx.drawImage(img, 0, 0, W, H); res(); };
                        img.src = page.canvasData;
                    });
                }

                if (page.items) {
                    for (const item of page.items) {
                        await new Promise(res => {
                            const img = new Image();
                            img.onload = () => {
                                const l = parseFloat(item.left);
                                const t = parseFloat(item.top);
                                const w = parseFloat(item.width);
                                const ratio = img.naturalHeight / img.naturalWidth;
                                octx.drawImage(img, l, t, w, w * ratio);
                                res();
                            };
                            img.onerror = res;
                            img.src = item.src;
                        });
                    }
                }

                const dataUrl = offscreen.toDataURL('image/png');
                slide.addImage({ data: dataUrl, x: 0, y: 0, w: '100%', h: '100%' });
            }

            try {
                const blob = await pptx.write('blob');
                const suggestedName = `Whiteboard_${new Date().getTime()}.pptx`;
                await saveBlobWithPicker(blob, suggestedName, [{
                    description: 'PowerPoint Presentation',
                    accept: { 'application/vnd.openxmlformats-officedocument.presentationml.presentation': ['.pptx'] }
                }]);
            } catch (err) {
                console.error(err);
                showToast('PPTX Export Failed');
            }
        }

        async function saveBlobWithPicker(blob, suggestedName, types) {
            // Check for File System Access API support
            if ('showSaveFilePicker' in window) {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: suggestedName,
                        types: types
                    });
                    const writable = await handle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                    showToast('Saved successfully');
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        console.error(err);
                        showToast('Failed to save file');
                    }
                }
            } else {
                // Fallback for browsers that don't support the API
                const name = prompt("Enter filename:", suggestedName);
                if (name === null) return; // Cancelled
                
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = name.endsWith(types[0].accept[Object.keys(types[0].accept)[0]][0]) ? name : name + types[0].accept[Object.keys(types[0].accept)[0]][0];
                a.click();
                URL.revokeObjectURL(url);
                showToast('Download started');
            }
        }

        function debounce(f, w) {
            let t; return (...a) => { clearTimeout(t); t = setTimeout(() => f(...a), w); };
        }

        init();
    </script>
